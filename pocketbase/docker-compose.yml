services:
  pocketbase:
    build:
      context: .
      args:
        # Pin the PocketBase version here. Do not use :latest.
        PB_VERSION: 0.39.1
    image: leblovina-pocketbase:0.39.1
    container_name: leblovina-pb
    restart: unless-stopped
    ports:
      - "8090:8090"   # admin UI at http://localhost:8090/_/
    volumes:
      # Persisted SQLite data — gitignored, never committed.
      - ./pb_data:/pb/pb_data
      # Schema as code — committed. PocketBase auto-applies these on boot.
      - ./pb_migrations:/pb/pb_migrations
      # Optional server-side JS hooks.
      - ./pb_hooks:/pb/pb_hooks
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
